<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二足机甲战斗</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #333;
            background: #1a1a1a;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
        }
        #info h3 {
            margin: 0 0 10px 0;
            color: #00d4ff;
        }
        #info p {
            margin: 5px 0;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>操作说明</h3>
        <p><span class="key">W</span><span class="key">S</span> - 前进/后退</p>
        <p><span class="key">A</span><span class="key">D</span> - 左右侧移（横向平移）</p>
        <p><span class="key">Q</span><span class="key">E</span> - 机甲左右转向</p>
        <p><span class="key">←</span><span class="key">→</span> - 上半身/武器左右转向</p>
        <p><span class="key">空格</span> - 发射武器/近战攻击</p>
        <p><span class="key">1</span><span class="key">2</span><span class="key">3</span><span class="key">4</span><span class="key">5</span> - 切换武器</p>
        <p><span class="key">F</span> - 发射钩爪</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 800;
        canvas.height = 600;
        
        // 世界地图大小（远大于画布）
        const WORLD_WIDTH = 2400;
        const WORLD_HEIGHT = 2400;
        
        // 相机偏移
        let cameraX = 0;
        let cameraY = 0;
        
        const keys = {};
        const bullets = [];
        const particles = [];
        const footprints = [];
        const meleeAttacks = [];
        const hooks = [];
        const obstacles = [];
        const enemies = [];
        
        // 生成障碍物
        function generateObstacles() {
            const obstacleCount = 40;
            for (let i = 0; i < obstacleCount; i++) {
                const type = Math.random() < 0.5 ? 'rock' : 'building';
                const width = 30 + Math.random() * 80;
                const height = 30 + Math.random() * 80;
                obstacles.push({
                    x: Math.random() * (WORLD_WIDTH - width - 100) + 50,
                    y: Math.random() * (WORLD_HEIGHT - height - 100) + 50,
                    width: width,
                    height: height,
                    type: type,
                    color: type === 'rock' ? '#555' : '#3a3a4a'
                });
            }
        }
        
        // 生成杂兵
        function generateEnemies() {
            const enemyCount = 15;
            for (let i = 0; i < enemyCount; i++) {
                enemies.push(new Enemy(
                    Math.random() * (WORLD_WIDTH - 200) + 100,
                    Math.random() * (WORLD_HEIGHT - 200) + 100
                ));
            }
        }
        
        // 杂兵类
        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 1;
                this.size = 12;
                this.color = '#ff4444';
                this.health = 30;
                this.maxHealth = 30;
                this.moveTimer = 0;
                this.moveDuration = 60 + Math.random() * 60;
                this.shootCooldown = 0;
                this.fireRate = 40 + Math.random() * 30;
            }
            
            update() {
                // 简单AI移动
                this.moveTimer++;
                if (this.moveTimer > this.moveDuration) {
                    this.moveTimer = 0;
                    this.moveDuration = 60 + Math.random() * 60;
                    this.angle += (Math.random() - 0.5) * Math.PI;
                }
                
                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * this.speed;
                
                // 边界限制
                this.x = Math.max(this.size, Math.min(WORLD_WIDTH - this.size, this.x));
                this.y = Math.max(this.size, Math.min(WORLD_HEIGHT - this.size, this.y));
                
                // 射击
                if (this.shootCooldown > 0) this.shootCooldown--;
                
                // 检测与玩家距离
                const dx = mech.x - this.x;
                const dy = mech.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 300 && this.shootCooldown <= 0) {
                    // 朝向玩家射击
                    const angleToPlayer = Math.atan2(dx, -dy);
                    bullets.push(new Bullet(
                        this.x, this.y,
                        angleToPlayer + (Math.random() - 0.5) * 0.3,
                        WEAPONS.VULCAN
                    ));
                    this.shootCooldown = this.fireRate;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x - cameraX, this.y - cameraY);
                ctx.rotate(this.angle);
                
                // 身体
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                
                // 炮管
                ctx.fillStyle = '#aa2222';
                ctx.fillRect(-2, -this.size - 8, 4, 8);
                
                // 方向指示
                ctx.fillStyle = '#ff8888';
                ctx.beginPath();
                ctx.arc(0, -this.size + 4, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                
                // 血条
                const barWidth = 20;
                const barHeight = 3;
                const screenX = this.x - cameraX;
                const screenY = this.y - cameraY;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(screenX - barWidth/2, screenY - this.size - 10, barWidth, barHeight);
                
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(screenX - barWidth/2, screenY - this.size - 10, barWidth * (this.health / this.maxHealth), barHeight);
            }
        }
        
        // 武器类型定义
        const WEAPONS = {
            VULCAN: {
                name: '火神炮',
                color: '#7a3a2a',
                muzzleColor: '#5a2a1a',
                bulletColor: '#ff6622',
                bulletSpeed: 12,
                bulletRadius: 2.5,
                fireRate: 3,
                damage: 6,
                recoil: 0.15,
                spread: 0.08,
                bulletLife: 60,
                barrelLength: 28,
                barrelWidth: 8,
                drawType: 'vulcan',
                heatPerShot: 8,
                heatDecay: 0.5,
                overheatThreshold: 100,
                overheatCooldown: 120
            },
            SHOTGUN: {
                name: '霰弹枪',
                color: '#8a6a4a',
                muzzleColor: '#5a3a2a',
                bulletColor: '#ffaa44',
                bulletSpeed: 8,
                bulletRadius: 2,
                fireRate: 30,
                damage: 8,
                recoil: 0.8,
                spread: 0.3,
                bulletLife: 40,
                pelletCount: 5,
                barrelLength: 22,
                barrelWidth: 10,
                drawType: 'shotgun'
            },
            CANNON: {
                name: '加农炮',
                color: '#6a7a6a',
                muzzleColor: '#3a4a3a',
                bulletColor: '#ff6644',
                bulletSpeed: 6,
                bulletRadius: 8,
                fireRate: 50,
                damage: 50,
                recoil: 1.5,
                spread: 0.02,
                bulletLife: 120,
                barrelLength: 35,
                barrelWidth: 12,
                drawType: 'cannon'
            },
            LASER: {
                name: '激光炮',
                color: '#9a4a6a',
                muzzleColor: '#6a2a4a',
                bulletColor: '#ff44aa',
                bulletSpeed: 15,
                bulletRadius: 4,
                fireRate: 15,
                damage: 15,
                recoil: 0.2,
                spread: 0.01,
                bulletLife: 60,
                barrelLength: 28,
                barrelWidth: 8,
                drawType: 'laser'
            },
            BLADE: {
                name: '光束军刀',
                color: '#00ff88',
                muzzleColor: '#00cc66',
                bulletColor: '#00ff88',
                bulletSpeed: 0,
                bulletRadius: 0,
                fireRate: 20,
                damage: 35,
                recoil: 0,
                spread: 0,
                bulletLife: 0,
                barrelLength: 30,
                barrelWidth: 4,
                drawType: 'blade',
                swingRange: Math.PI * 0.6,
                swingSpeed: 0.3,
                swingDuration: 15
            }
        };
        
        // 二足机甲类
        class Mech {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.bodyAngle = 0;
                this.upperAngle = 0;
                this.weaponAngle = 0;
                
                this.velocityX = 0;
                this.velocityY = 0;
                this.maxSpeed = 2.5;
                this.acceleration = 0.12;
                this.deceleration = 0.04;
                
                this.turnVelocity = 0;
                this.maxTurnSpeed = 0.05;
                this.turnDeceleration = 0.03;
                
                this.upperTurnVelocity = 0;
                this.maxUpperTurnSpeed = 0.04;
                this.upperTurnDeceleration = 0.025;
                
                this.weaponTurnVelocity = 0;
                this.maxWeaponTurnSpeed = 0.035;
                this.weaponTurnDeceleration = 0.02;
                
                this.walkCycle = 0;
                this.walkSpeed = 0.15;
                
                this.legWidth = 8;
                this.legLength = 35;
                this.bodyWidth = 30;
                this.bodyHeight = 25;
                this.upperWidth = 25;
                this.upperHeight = 20;
                
                this.jetParticles = [];
                
                this.currentWeapon = WEAPONS.VULCAN;
                this.fireCooldown = 0;
                this.weaponKeys = ['1', '2', '3', '4', '5'];
                this.weaponList = [WEAPONS.VULCAN, WEAPONS.SHOTGUN, WEAPONS.CANNON, WEAPONS.LASER, WEAPONS.BLADE];
                
                // 火神炮温度系统
                this.heatLevel = 0;
                this.isOverheated = false;
                this.overheatTimer = 0;
                
                // 近战攻击状态
                this.isSwinging = false;
                this.swingProgress = 0;
                this.swingDirection = 1;
            }
            
            update() {
                // 武器切换
                for (let i = 0; i < this.weaponKeys.length; i++) {
                    if (keys[this.weaponKeys[i]]) {
                        this.currentWeapon = this.weaponList[i];
                        keys[this.weaponKeys[i]] = false;
                        this.isSwinging = false;
                        break;
                    }
                }
                
                // 射击冷却
                if (this.fireCooldown > 0) {
                    this.fireCooldown--;
                }
                
                // 火神炮温度管理
                if (this.currentWeapon.drawType === 'vulcan') {
                    if (this.isOverheated) {
                        this.overheatTimer--;
                        this.heatLevel = (this.overheatTimer / this.currentWeapon.overheatCooldown) * this.currentWeapon.overheatThreshold;
                        if (this.overheatTimer <= 0) {
                            this.isOverheated = false;
                            this.heatLevel = 0;
                        }
                    } else {
                        // 不射击时温度下降
                        if (!keys[' ']) {
                            this.heatLevel = Math.max(0, this.heatLevel - this.currentWeapon.heatDecay);
                        }
                    }
                }
                
                // 近战攻击动画
                if (this.isSwinging) {
                    this.swingProgress += this.swingDirection * this.currentWeapon.swingSpeed;
                    if (this.swingProgress >= this.currentWeapon.swingRange / 2) {
                        this.swingDirection = -1;
                    }
                    if (this.swingProgress <= -this.currentWeapon.swingRange / 2) {
                        this.isSwinging = false;
                        this.swingProgress = 0;
                        this.swingDirection = 1;
                    }
                }
                
                // 移动
                let moveForward = 0;
                if (keys['w'] || keys['W']) moveForward = 1;
                else if (keys['s'] || keys['S']) moveForward = -1;
                
                let moveSide = 0;
                if (keys['a'] || keys['A']) moveSide = -1;
                else if (keys['d'] || keys['D']) moveSide = 1;
                
                const cos = Math.cos(this.bodyAngle);
                const sin = Math.sin(this.bodyAngle);
                
                const targetVX = (sin) * moveForward * this.maxSpeed + cos * moveSide * this.maxSpeed * 0.7;
                const targetVY = (-cos) * moveForward * this.maxSpeed + sin * moveSide * this.maxSpeed * 0.7;
                
                if (moveForward !== 0 || moveSide !== 0) {
                    this.velocityX += (targetVX - this.velocityX) * this.acceleration;
                    this.velocityY += (targetVY - this.velocityY) * this.acceleration;
                } else {
                    this.velocityX *= (1 - this.deceleration);
                    this.velocityY *= (1 - this.deceleration);
                    if (Math.abs(this.velocityX) < 0.01) this.velocityX = 0;
                    if (Math.abs(this.velocityY) < 0.01) this.velocityY = 0;
                }
                
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.x = Math.max(30, Math.min(WORLD_WIDTH - 30, this.x));
                this.y = Math.max(30, Math.min(WORLD_HEIGHT - 30, this.y));
                
                // 障碍物碰撞检测（玩家）
                for (let i = 0; i < obstacles.length; i++) {
                    const obs = obstacles[i];
                    if (this.x + this.bodyWidth/2 > obs.x && this.x - this.bodyWidth/2 < obs.x + obs.width &&
                        this.y + this.bodyHeight/2 > obs.y && this.y - this.bodyHeight/2 < obs.y + obs.height) {
                        // 简单推开
                        const centerX = obs.x + obs.width/2;
                        const centerY = obs.y + obs.height/2;
                        const dx = this.x - centerX;
                        const dy = this.y - centerY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > 0) {
                            this.x += (dx / dist) * 3;
                            this.y += (dy / dist) * 3;
                        }
                    }
                }
                
                // 转向
                let targetTurn = 0;
                if (keys['e'] || keys['E']) targetTurn = this.maxTurnSpeed;
                else if (keys['q'] || keys['Q']) targetTurn = -this.maxTurnSpeed;
                
                if (targetTurn !== 0) {
                    this.turnVelocity += (targetTurn - this.turnVelocity) * 0.15;
                } else {
                    this.turnVelocity *= (1 - this.turnDeceleration);
                    if (Math.abs(this.turnVelocity) < 0.001) this.turnVelocity = 0;
                }
                this.bodyAngle += this.turnVelocity;
                
                let targetUpperTurn = 0;
                if (keys['ArrowLeft']) targetUpperTurn = -this.maxUpperTurnSpeed;
                else if (keys['ArrowRight']) targetUpperTurn = this.maxUpperTurnSpeed;
                
                if (targetUpperTurn !== 0) {
                    this.upperTurnVelocity += (targetUpperTurn - this.upperTurnVelocity) * 0.12;
                } else {
                    this.upperTurnVelocity *= (1 - this.upperTurnDeceleration);
                    if (Math.abs(this.upperTurnVelocity) < 0.001) this.upperTurnVelocity = 0;
                }
                this.upperAngle += this.upperTurnVelocity;
                
                const maxUpperAngle = Math.PI * 0.8;
                this.upperAngle = Math.max(-maxUpperAngle, Math.min(maxUpperAngle, this.upperAngle));
                
                let targetWeaponTurn = 0;
                if (keys['Shift'] && keys['ArrowLeft']) targetWeaponTurn = -this.maxWeaponTurnSpeed;
                else if (keys['Shift'] && keys['ArrowRight']) targetWeaponTurn = this.maxWeaponTurnSpeed;
                
                if (targetWeaponTurn !== 0) {
                    this.weaponTurnVelocity += (targetWeaponTurn - this.weaponTurnVelocity) * 0.1;
                } else {
                    this.weaponTurnVelocity *= (1 - this.weaponTurnDeceleration);
                    if (Math.abs(this.weaponTurnVelocity) < 0.001) this.weaponTurnVelocity = 0;
                }
                this.weaponAngle += this.weaponTurnVelocity;
                
                // 行走动画
                const speed = Math.sqrt(this.velocityX * this.velocityX + this.velocityY * this.velocityY);
                if (speed > 0.1) {
                    this.walkCycle += this.walkSpeed * (speed / this.maxSpeed);
                }
                
                if (speed > 0.5 && Math.sin(this.walkCycle) > 0.9) {
                    this.addFootprint();
                }
                
                for (let i = footprints.length - 1; i >= 0; i--) {
                    footprints[i].opacity -= 0.005;
                    if (footprints[i].opacity <= 0) {
                        footprints.splice(i, 1);
                    }
                }
                
                if (speed > 1 || Math.abs(this.turnVelocity) > 0.01) {
                    this.addJetParticle();
                }
                
                for (let i = this.jetParticles.length - 1; i >= 0; i--) {
                    this.jetParticles[i].update();
                    if (this.jetParticles[i].life <= 0) {
                        this.jetParticles.splice(i, 1);
                    }
                }
            }
            
            addFootprint() {
                const cos = Math.cos(this.bodyAngle);
                const sin = Math.sin(this.bodyAngle);
                const offset = 12;
                
                footprints.push({
                    x: this.x + cos * this.legLength * 0.6 + (Math.sin(this.walkCycle) > 0 ? -sin * offset : sin * offset),
                    y: this.y + sin * this.legLength * 0.6 + (Math.sin(this.walkCycle) > 0 ? cos * offset : -cos * offset),
                    angle: this.bodyAngle,
                    opacity: 0.3
                });
            }
            
            addJetParticle() {
                const cos = Math.cos(this.bodyAngle);
                const sin = Math.sin(this.bodyAngle);
                
                this.jetParticles.push({
                    x: this.x - cos * 15 + (Math.random() - 0.5) * 10,
                    y: this.y - sin * 15 + (Math.random() - 0.5) * 10,
                    vx: -cos * 0.5 + (Math.random() - 0.5) * 0.3,
                    vy: -sin * 0.5 + (Math.random() - 0.5) * 0.3,
                    life: 20,
                    maxLife: 20,
                    color: 'hsl(' + (180 + Math.random() * 40) + ', 80%, 60%)',
                    update: function() {
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vx *= 0.95;
                        this.vy *= 0.95;
                        this.life--;
                    }
                });
            }
            
            draw() {
                for (let i = 0; i < footprints.length; i++) {
                    const fp = footprints[i];
                    ctx.save();
                    ctx.translate(fp.x, fp.y);
                    ctx.rotate(fp.angle);
                    ctx.fillStyle = 'rgba(80, 80, 80, ' + fp.opacity + ')';
                    ctx.fillRect(-4, -6, 8, 12);
                    ctx.restore();
                }
                
                for (let i = 0; i < this.jetParticles.length; i++) {
                    const p = this.jetParticles[i];
                    const opacity = p.life / p.maxLife;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = opacity * 0.6;
                    ctx.beginPath();
                    ctx.arc(p.x - cameraX, p.y - cameraY, 2 * opacity, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                
                ctx.save();
                ctx.translate(this.x - cameraX, this.y - cameraY);
                
                const leftLegOffset = Math.sin(this.walkCycle) * 8;
                const rightLegOffset = Math.sin(this.walkCycle + Math.PI) * 8;
                const leftKnee = Math.sin(this.walkCycle + Math.PI * 0.5) * 5;
                const rightKnee = Math.sin(this.walkCycle + Math.PI * 1.5) * 5;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(0, 25, 25, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.save();
                ctx.rotate(this.bodyAngle);
                this.drawLeg(-12, leftLegOffset, leftKnee, true);
                ctx.restore();
                
                ctx.save();
                ctx.rotate(this.bodyAngle);
                this.drawLeg(12, rightLegOffset, rightKnee, false);
                ctx.restore();
                
                ctx.save();
                ctx.rotate(this.bodyAngle);
                
                ctx.fillStyle = '#4a5568';
                ctx.fillRect(-this.bodyWidth/2, -this.bodyHeight/2, this.bodyWidth, this.bodyHeight);
                ctx.fillStyle = '#2d3748';
                ctx.fillRect(-this.bodyWidth/2 + 3, -this.bodyHeight/2 + 3, this.bodyWidth - 6, this.bodyHeight - 6);
                ctx.strokeStyle = '#5a6578';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-10, -8);
                ctx.lineTo(10, -8);
                ctx.moveTo(-10, 0);
                ctx.lineTo(10, 0);
                ctx.moveTo(-10, 8);
                ctx.lineTo(10, 8);
                ctx.stroke();
                ctx.restore();
                
                ctx.save();
                ctx.rotate(this.bodyAngle + this.upperAngle);
                
                ctx.fillStyle = '#5a6a7d';
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#5a7a9a';
                ctx.fillRect(-this.upperWidth/2, -this.upperHeight/2 - 5, this.upperWidth, this.upperHeight);
                
                ctx.fillStyle = '#7a9aba';
                ctx.beginPath();
                ctx.arc(0, -5, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#a0d0f0';
                ctx.beginPath();
                ctx.arc(0, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#4a6a8a';
                ctx.fillRect(-this.upperWidth/2 - 3, -this.upperHeight/2 - 3, 6, 12);
                ctx.fillRect(this.upperWidth/2 - 3, -this.upperHeight/2 - 3, 6, 12);
                
                ctx.save();
                ctx.rotate(this.weaponAngle);
                this.drawWeapon();
                ctx.restore();
                
                ctx.restore();
                ctx.restore();
            }
            
            drawWeapon() {
                const w = this.currentWeapon;
                
                ctx.fillStyle = w.color;
                ctx.beginPath();
                ctx.arc(0, -5, 6, 0, Math.PI * 2);
                ctx.fill();
                
                switch (w.drawType) {
                    case 'vulcan':
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        ctx.fillStyle = w.muzzleColor;
                        ctx.fillRect(-w.barrelWidth/2 - 1, -w.barrelLength, w.barrelWidth + 2, 4);
                        ctx.fillStyle = '#aa5a3a';
                        ctx.fillRect(-1, -w.barrelLength + 2, 2, w.barrelLength - 4);
                        // 散热片
                        ctx.fillStyle = '#8a4a2a';
                        for (let i = 0; i < 4; i++) {
                            ctx.fillRect(-w.barrelWidth/2 - 2, -w.barrelLength + 5 + i * 5, w.barrelWidth + 4, 2);
                        }
                        // 温度指示
                        if (this.heatLevel > 0) {
                            const heatRatio = this.heatLevel / w.overheatThreshold;
                            ctx.fillStyle = 'rgba(255, ' + (255 - heatRatio * 255) + ', 0, 0.5)';
                            ctx.fillRect(-w.barrelWidth/2 - 3, -w.barrelLength, 2, w.barrelLength * heatRatio);
                        }
                        break;
                        
                    case 'shotgun':
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        ctx.fillStyle = w.muzzleColor;
                        ctx.fillRect(-4, -w.barrelLength, 3, w.barrelLength - 2);
                        ctx.fillRect(1, -w.barrelLength, 3, w.barrelLength - 2);
                        ctx.fillStyle = '#6a5a4a';
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(-6, -w.barrelLength + 5 + i * 6, 12, 2);
                        }
                        break;
                        
                    case 'cannon':
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        ctx.fillStyle = w.muzzleColor;
                        ctx.fillRect(-w.barrelWidth/2 - 2, -w.barrelLength - 3, w.barrelWidth + 4, 6);
                        ctx.fillStyle = '#5a6a5a';
                        ctx.fillRect(-3, -10, 6, 8);
                        ctx.fillRect(-8, -8, 16, 3);
                        ctx.fillStyle = '#8a9a8a';
                        ctx.fillRect(-2, -w.barrelLength + 3, 4, w.barrelLength - 6);
                        break;
                        
                    case 'laser':
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        ctx.fillStyle = '#ff88cc';
                        ctx.beginPath();
                        ctx.arc(0, -w.barrelLength/2, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#ff44aa';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, -w.barrelLength/2, 5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(255, 100, 180, 0.3)';
                        ctx.beginPath();
                        ctx.arc(0, -w.barrelLength/2, 8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ff66aa';
                        ctx.fillRect(-w.barrelWidth/2 - 1, -w.barrelLength - 2, w.barrelWidth + 2, 3);
                        break;
                        
                    case 'blade':
                        // 光束军刀
                        const bladeLength = w.barrelLength;
                        const swingOffset = this.isSwinging ? this.swingProgress : 0;
                        
                        ctx.save();
                        ctx.rotate(swingOffset);
                        
                        // 刀柄
                        ctx.fillStyle = '#4a5a6a';
                        ctx.fillRect(-3, -8, 6, 10);
                        ctx.fillStyle = '#6a7a8a';
                        ctx.fillRect(-2, -6, 4, 6);
                        
                        // 光束刀刃
                        ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
                        ctx.beginPath();
                        ctx.moveTo(-6, -8);
                        ctx.lineTo(0, -8 - bladeLength);
                        ctx.lineTo(6, -8);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.fillStyle = 'rgba(0, 255, 200, 0.6)';
                        ctx.beginPath();
                        ctx.moveTo(-3, -8);
                        ctx.lineTo(0, -8 - bladeLength * 0.9);
                        ctx.lineTo(3, -8);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.moveTo(-1, -8);
                        ctx.lineTo(0, -8 - bladeLength * 0.8);
                        ctx.lineTo(1, -8);
                        ctx.closePath();
                        ctx.fill();
                        
                        // 挥舞轨迹
                        if (this.isSwinging) {
                            ctx.fillStyle = 'rgba(0, 255, 136, 0.15)';
                            ctx.beginPath();
                            ctx.arc(0, -8, bladeLength, -this.currentWeapon.swingRange/2 - Math.PI/2, this.currentWeapon.swingRange/2 - Math.PI/2);
                            ctx.closePath();
                            ctx.fill();
                        }
                        
                        ctx.restore();
                        break;
                }
            }
            
            drawLeg(xOffset, footOffset, kneeOffset, isLeft) {
                ctx.strokeStyle = '#4a5568';
                ctx.lineWidth = this.legWidth;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(xOffset, 0);
                ctx.lineTo(xOffset + kneeOffset * 0.3, this.legLength * 0.5);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(xOffset + kneeOffset * 0.3, this.legLength * 0.5);
                ctx.lineTo(xOffset + footOffset * 0.2, this.legLength + footOffset * 0.1);
                ctx.stroke();
                
                ctx.fillStyle = '#5a6a7d';
                ctx.beginPath();
                ctx.arc(xOffset, 0, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(xOffset + kneeOffset * 0.3, this.legLength * 0.5, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#3a4558';
                ctx.save();
                ctx.translate(xOffset + footOffset * 0.2, this.legLength + footOffset * 0.1);
                ctx.fillRect(-6, -2, 12, 6);
                ctx.restore();
            }
            
            shoot() {
                if (this.fireCooldown > 0) return;
                
                const w = this.currentWeapon;
                
                // 火神炮过热检查
                if (w.drawType === 'vulcan') {
                    if (this.isOverheated) return;
                    this.heatLevel += w.heatPerShot;
                    if (this.heatLevel >= w.overheatThreshold) {
                        this.isOverheated = true;
                        this.overheatTimer = w.overheatCooldown;
                        this.heatLevel = w.overheatThreshold;
                    }
                }
                
                // 近战攻击
                if (w.drawType === 'blade') {
                    if (!this.isSwinging) {
                        this.isSwinging = true;
                        this.swingProgress = -w.swingRange / 2;
                        this.swingDirection = 1;
                        this.fireCooldown = w.fireRate;
                        
                        // 近战特效
                        const totalAngle = this.bodyAngle + this.upperAngle + this.weaponAngle;
                        const cos = Math.cos(totalAngle);
                        const sin = Math.sin(totalAngle);
                        
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(
                                this.x + sin * 20 + (Math.random() - 0.5) * 30,
                                this.y - cos * 20 + (Math.random() - 0.5) * 30,
                                (Math.random() - 0.5) * 4,
                                (Math.random() - 0.5) * 4,
                                '#00ff88'
                            ));
                        }
                    }
                    return;
                }
                
                this.fireCooldown = w.fireRate;
                
                const totalAngle = this.bodyAngle + this.upperAngle + this.weaponAngle;
                const cos = Math.cos(totalAngle);
                const sin = Math.sin(totalAngle);
                
                const muzzleX = this.x + sin * w.barrelLength;
                const muzzleY = this.y - cos * w.barrelLength;
                
                if (w.drawType === 'shotgun') {
                    for (let i = 0; i < w.pelletCount; i++) {
                        const spread = (Math.random() - 0.5) * w.spread * 2;
                        bullets.push(new Bullet(muzzleX, muzzleY, totalAngle + spread, w));
                    }
                } else if (w.drawType === 'laser') {
                    bullets.push(new LaserBeam(muzzleX, muzzleY, totalAngle, w));
                } else {
                    const spread = (Math.random() - 0.5) * w.spread * 2;
                    bullets.push(new Bullet(muzzleX, muzzleY, totalAngle + spread, w));
                }
                
                const particleCount = w.drawType === 'cannon' ? 15 : 8;
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(
                        muzzleX, muzzleY,
                        -sin * 2 + (Math.random() - 0.5) * 3,
                        cos * 2 + (Math.random() - 0.5) * 3,
                        w.bulletColor
                    ));
                }
                
                this.velocityX -= sin * w.recoil;
                this.velocityY += cos * w.recoil;
            }
            
            fireHook() {
                // 检查是否已有钩爪，有则取消
                for (let i = 0; i < hooks.length; i++) {
                    if (hooks[i].state !== 'done') {
                        hooks[i].state = 'retracting';
                        return;
                    }
                }
                
                const totalAngle = this.bodyAngle + this.upperAngle + this.weaponAngle;
                const cos = Math.cos(totalAngle);
                const sin = Math.sin(totalAngle);
                
                const muzzleX = this.x + sin * this.currentWeapon.barrelLength;
                const muzzleY = this.y - cos * this.currentWeapon.barrelLength;
                
                hooks.push(new Hook(muzzleX, muzzleY, totalAngle));
            }
        }
        
        // 激光束类
        class LaserBeam {
            constructor(x, y, angle, weapon) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.weapon = weapon;
                this.life = weapon.bulletLife;
                this.maxLife = weapon.bulletLife;
                this.damage = weapon.damage;
                this.length = 0;
                this.maxLength = 200;
                this.width = weapon.bulletRadius * 2;
            }
            
            update() {
                this.life--;
                if (this.length < this.maxLength) {
                    this.length += this.weapon.bulletSpeed * 3;
                }
            }
            
            draw() {
                const opacity = this.life / this.maxLife;
                const cos = Math.cos(this.angle);
                const sin = Math.sin(this.angle);
                
                // 光束外发光
                ctx.strokeStyle = 'rgba(255, 100, 180, ' + (opacity * 0.3) + ')';
                ctx.lineWidth = this.width + 6;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x - cameraX, this.y - cameraY);
                ctx.lineTo(this.x + sin * this.length - cameraX, this.y - cos * this.length - cameraY);
                ctx.stroke();
                
                // 光束主体
                ctx.strokeStyle = 'rgba(255, 68, 170, ' + (opacity * 0.6) + ')';
                ctx.lineWidth = this.width + 2;
                ctx.beginPath();
                ctx.moveTo(this.x - cameraX, this.y - cameraY);
                ctx.lineTo(this.x + sin * this.length - cameraX, this.y - cos * this.length - cameraY);
                ctx.stroke();
                
                // 光束核心
                ctx.strokeStyle = 'rgba(255, 200, 230, ' + opacity + ')';
                ctx.lineWidth = this.width * 0.5;
                ctx.beginPath();
                ctx.moveTo(this.x - cameraX, this.y - cameraY);
                ctx.lineTo(this.x + sin * this.length - cameraX, this.y - cos * this.length - cameraY);
                ctx.stroke();
                
                // 端点发光
                ctx.fillStyle = 'rgba(255, 255, 255, ' + opacity + ')';
                ctx.beginPath();
                ctx.arc(this.x + sin * this.length - cameraX, this.y - cos * this.length - cameraY, this.width, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 钩爪类
        class Hook {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.startX = x;
                this.startY = y;
                this.angle = angle;
                this.speed = 15;
                this.maxLength = 300;
                this.length = 0;
                this.state = 'flying'; // flying, hooked, retracting
                this.life = 120;
                this.hookX = x;
                this.hookY = y;
            }
            
            update(mech) {
                const cos = Math.cos(this.angle);
                const sin = Math.sin(this.angle);
                
                if (this.state === 'flying') {
                    this.length += this.speed;
                    this.hookX = this.startX + sin * this.length;
                    this.hookY = this.startY - cos * this.length;
                    
                    // 边界检测
                    if (this.hookX < 0 || this.hookX > WORLD_WIDTH ||
                        this.hookY < 0 || this.hookY > WORLD_HEIGHT ||
                        this.length >= this.maxLength) {
                        this.state = 'retracting';
                    }
                    
                    // 障碍物碰撞检测
                    for (let i = 0; i < obstacles.length; i++) {
                        const obs = obstacles[i];
                        if (this.hookX >= obs.x && this.hookX <= obs.x + obs.width &&
                            this.hookY >= obs.y && this.hookY <= obs.y + obs.height) {
                            this.state = 'hooked';
                            this.hookX = this.hookX;
                            this.hookY = this.hookY;
                            break;
                        }
                    }
                    
                    // 地面碰撞检测（任何非障碍物位置都可以钩住）
                    if (this.state === 'flying') {
                        // 检查是否碰到地面（这里简单处理为钩住任何位置）
                        // 实际上钩爪应该可以固定在任何位置，不仅仅是障碍物
                        // 如果飞行距离达到最大长度，也钩住
                        if (this.length >= this.maxLength) {
                            this.state = 'hooked';
                            this.hookX = this.hookX;
                            this.hookY = this.hookY;
                        }
                    }
                } else if (this.state === 'hooked') {
                    // 拉拽机甲向钩爪点，但允许玩家自由移动
                    const dx = this.hookX - mech.x;
                    const dy = this.hookY - mech.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // 限制最大距离为绳索长度
                    const maxRopeLength = this.length;
                    if (dist > maxRopeLength) {
                        // 将机甲位置限制在绳索长度范围内
                        const ratio = maxRopeLength / dist;
                        mech.x = this.hookX - dx * ratio;
                        mech.y = this.hookY - dy * ratio;
                        // 给一点弹性缓冲
                        mech.velocityX *= 0.5;
                        mech.velocityY *= 0.5;
                    }
                    
                    // 保持轻微拉拽力让绳索绷紧
                    if (dist > maxRopeLength * 0.8) {
                        const pullSpeed = 2;
                        mech.velocityX += (dx / dist) * pullSpeed * 0.1;
                        mech.velocityY += (dy / dist) * pullSpeed * 0.1;
                    }
                } else if (this.state === 'retracting') {
                    this.length -= this.speed * 1.5;
                    if (this.length <= 0) {
                        this.life = 0;
                    }
                }
                
                if (this.life <= 0) {
                    this.state = 'done';
                }
            }
            
            draw() {
                if (this.state === 'done') return;
                
                // 使用当前机甲角度计算枪口位置（实时更新）
                const totalAngle = mech.bodyAngle + mech.upperAngle + mech.weaponAngle;
                const cos = Math.cos(totalAngle);
                const sin = Math.sin(totalAngle);
                
                // 绳索起点始终跟随机甲当前枪口位置
                const muzzleX = mech.x + sin * mech.currentWeapon.barrelLength - cameraX;
                const muzzleY = mech.y - cos * mech.currentWeapon.barrelLength - cameraY;
                
                // 计算当前钩爪位置（固定在世界坐标）
                const currentHookX = this.hookX - cameraX;
                const currentHookY = this.hookY - cameraY;
                
                // 绳索
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(muzzleX, muzzleY);
                ctx.lineTo(currentHookX, currentHookY);
                ctx.stroke();
                
                // 绳索高光
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(muzzleX, muzzleY);
                ctx.lineTo(currentHookX, currentHookY);
                ctx.stroke();
                
                // 钩爪头
                ctx.save();
                ctx.translate(currentHookX - cameraX, currentHookY - cameraY);
                ctx.rotate(this.angle);
                
                // 钩爪主体
                ctx.fillStyle = '#aaa';
                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 钩爪尖
                ctx.fillStyle = '#ccc';
                ctx.beginPath();
                ctx.moveTo(0, -8);
                ctx.lineTo(-4, 0);
                ctx.lineTo(4, 0);
                ctx.closePath();
                ctx.fill();
                
                // 发光效果
                if (this.state === 'flying') {
                    ctx.fillStyle = 'rgba(100, 200, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.state === 'hooked') {
                    ctx.fillStyle = 'rgba(0, 255, 100, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // 普通子弹类
        class Bullet {
            constructor(x, y, angle, weapon) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.weapon = weapon;
                this.speed = weapon.bulletSpeed;
                this.radius = weapon.bulletRadius;
                this.life = weapon.bulletLife;
                this.damage = weapon.damage;
            }
            
            update() {
                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * this.speed;
                this.life--;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x - cameraX, this.y - cameraY);
                ctx.rotate(this.angle);
                
                const w = this.weapon;
                
                if (w.drawType === 'cannon') {
                    ctx.fillStyle = 'rgba(255, 100, 50, 0.4)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = w.bulletColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(255, 150, 50, 0.6)';
                    ctx.fillRect(-this.radius - 8, -this.radius/2, 8, this.radius);
                } else if (w.drawType === 'vulcan') {
                    ctx.fillStyle = 'rgba(255, 100, 30, 0.4)';
                    ctx.fillRect(-8, -1, 6, 2);
                    
                    ctx.fillStyle = w.bulletColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(0, 200, 255, 0.4)';
                    ctx.fillRect(-12, -2, 10, 4);
                    
                    ctx.fillStyle = w.bulletColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(0, 200, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = 25;
                this.maxLife = 25;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life--;
            }
            
            draw() {
                const opacity = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(this.x - cameraX, this.y - cameraY, 2 + opacity * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        const mech = new Mech(WORLD_WIDTH / 2, WORLD_HEIGHT / 2);
        
        // 生成地图内容
        generateObstacles();
        generateEnemies();
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === ' ') {
                e.preventDefault();
                mech.shoot();
            }
            
            if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                mech.fireHook();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        function drawGrid() {
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 0.5;
            
            // 绘制世界网格（考虑相机偏移）
            const startX = Math.floor(cameraX / 40) * 40;
            const startY = Math.floor(cameraY / 40) * 40;
            
            for (let x = startX; x < cameraX + canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x - cameraX, 0);
                ctx.lineTo(x - cameraX, canvas.height);
                ctx.stroke();
            }
            
            for (let y = startY; y < cameraY + canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y - cameraY);
                ctx.lineTo(canvas.width, y - cameraY);
                ctx.stroke();
            }
        }
        
        function drawObstacles() {
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const screenX = obs.x - cameraX;
                const screenY = obs.y - cameraY;
                
                // 只绘制在视野内的障碍物
                if (screenX + obs.width < 0 || screenX > canvas.width ||
                    screenY + obs.height < 0 || screenY > canvas.height) {
                    continue;
                }
                
                ctx.fillStyle = obs.color;
                ctx.fillRect(screenX, screenY, obs.width, obs.height);
                
                // 边框
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 1;
                ctx.strokeRect(screenX, screenY, obs.width, obs.height);
                
                // 细节
                if (obs.type === 'rock') {
                    ctx.fillStyle = '#777';
                    ctx.fillRect(screenX + 5, screenY + 5, obs.width - 10, obs.height - 10);
                } else {
                    ctx.fillStyle = '#4a4a5a';
                    ctx.fillRect(screenX + 3, screenY + 3, obs.width - 6, obs.height - 6);
                    // 窗户
                    ctx.fillStyle = '#88aacc';
                    ctx.fillRect(screenX + obs.width/2 - 5, screenY + 5, 10, 8);
                }
            }
        }
        
        function drawMinimap() {
            const mapSize = 150;
            const mapX = canvas.width - mapSize - 10;
            const mapY = canvas.height - mapSize - 10;
            const scaleX = mapSize / WORLD_WIDTH;
            const scaleY = mapSize / WORLD_HEIGHT;
            
            // 背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(mapX, mapY, mapSize, mapSize);
            
            // 边框
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.strokeRect(mapX, mapY, mapSize, mapSize);
            
            // 绘制障碍物
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                ctx.fillStyle = '#666';
                ctx.fillRect(
                    mapX + obs.x * scaleX,
                    mapY + obs.y * scaleY,
                    Math.max(2, obs.width * scaleX),
                    Math.max(2, obs.height * scaleY)
                );
            }
            
            // 绘制敌人
            for (let i = 0; i < enemies.length; i++) {
                const enemy = enemies[i];
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(
                    mapX + enemy.x * scaleX,
                    mapY + enemy.y * scaleY,
                    2, 0, Math.PI * 2
                );
                ctx.fill();
            }
            
            // 绘制玩家
            ctx.fillStyle = '#00d4ff';
            ctx.beginPath();
            ctx.arc(
                mapX + mech.x * scaleX,
                mapY + mech.y * scaleY,
                3, 0, Math.PI * 2
            );
            ctx.fill();
            
            // 视野框
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 1;
            ctx.strokeRect(
                mapX + cameraX * scaleX,
                mapY + cameraY * scaleY,
                canvas.width * scaleX,
                canvas.height * scaleY
            );
        }
        
        function drawWeaponUI() {
            const startX = canvas.width - 150;
            const startY = 20;
            const itemHeight = 35;
            
            for (let i = 0; i < mech.weaponList.length; i++) {
                const w = mech.weaponList[i];
                const isActive = w === mech.currentWeapon;
                const y = startY + i * itemHeight;
                
                ctx.fillStyle = isActive ? 'rgba(0, 200, 255, 0.3)' : 'rgba(50, 50, 50, 0.5)';
                ctx.fillRect(startX, y, 130, 30);
                
                ctx.strokeStyle = isActive ? '#00d4ff' : '#555';
                ctx.lineWidth = isActive ? 2 : 1;
                ctx.strokeRect(startX, y, 130, 30);
                
                ctx.fillStyle = w.color;
                ctx.fillRect(startX + 5, y + 8, 14, 14);
                
                ctx.fillStyle = '#fff';
                ctx.font = '12px monospace';
                ctx.fillText((i + 1) + '. ' + w.name, startX + 24, y + 20);
            }
            
            // 火神炮温度槽
            if (mech.currentWeapon.drawType === 'vulcan') {
                const heatY = startY + mech.weaponList.length * itemHeight + 5;
                const heatRatio = mech.heatLevel / mech.currentWeapon.overheatThreshold;
                
                // 背景
                ctx.fillStyle = 'rgba(50, 50, 50, 0.5)';
                ctx.fillRect(startX, heatY, 130, 8);
                
                // 温度条
                let heatColor;
                if (mech.isOverheated) {
                    heatColor = 'rgba(255, 0, 0, 0.8)';
                } else if (heatRatio > 0.7) {
                    heatColor = 'rgba(255, 100, 0, 0.8)';
                } else if (heatRatio > 0.4) {
                    heatColor = 'rgba(255, 200, 0, 0.8)';
                } else {
                    heatColor = 'rgba(0, 200, 255, 0.8)';
                }
                ctx.fillStyle = heatColor;
                ctx.fillRect(startX, heatY, 130 * heatRatio, 8);
                
                // 边框
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 1;
                ctx.strokeRect(startX, heatY, 130, 8);
                
                // 过热警告
                if (mech.isOverheated) {
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 11px monospace';
                    ctx.fillText('过热!', startX + 45, heatY + 18);
                }
            }
            
            // 普通冷却条
            else if (mech.fireCooldown > 0) {
                const w = mech.currentWeapon;
                const cooldownRatio = mech.fireCooldown / w.fireRate;
                const cdY = startY + mech.weaponList.length * itemHeight + 5;
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.fillRect(startX, cdY, 130 * cooldownRatio, 5);
            }
        }
        
        function gameLoop() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新相机位置（跟随玩家）
            cameraX = mech.x - canvas.width / 2;
            cameraY = mech.y - canvas.height / 2;
            
            // 限制相机在世界边界内
            cameraX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, cameraX));
            cameraY = Math.max(0, Math.min(WORLD_HEIGHT - canvas.height, cameraY));
            
            drawGrid();
            drawObstacles();
            
            // 更新和绘制敌人
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                enemies[i].draw();
            }
            
            mech.update();
            mech.draw();
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                bullets[i].draw();
                
                // 检测子弹是否击中敌人（检测所有玩家发射的子弹，包括火神炮）
                if (bullets[i] instanceof Bullet) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const dx = bullets[i].x - enemies[j].x;
                        const dy = bullets[i].y - enemies[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < enemies[j].size + bullets[i].radius) {
                            enemies[j].health -= bullets[i].damage;
                            // 击中特效
                            for (let k = 0; k < 5; k++) {
                                particles.push(new Particle(
                                    enemies[j].x, enemies[j].y,
                                    (Math.random() - 0.5) * 4,
                                    (Math.random() - 0.5) * 4,
                                    '#ff4444'
                                ));
                            }
                            
                            if (enemies[j].health <= 0) {
                                enemies.splice(j, 1);
                            }
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                }
                
                // 检测激光束击中敌人
                if (bullets[i] instanceof LaserBeam) {
                    const cos = Math.cos(bullets[i].angle);
                    const sin = Math.sin(bullets[i].angle);
                    const beamEndX = bullets[i].x + sin * bullets[i].length;
                    const beamEndY = bullets[i].y - cos * bullets[i].length;
                    
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        // 计算敌人到激光线段的距离
                        const dx = enemies[j].x - bullets[i].x;
                        const dy = enemies[j].y - bullets[i].y;
                        const proj = dx * sin + dy * (-cos);
                        const clampedProj = Math.max(0, Math.min(bullets[i].length, proj));
                        const closestX = bullets[i].x + sin * clampedProj;
                        const closestY = bullets[i].y - cos * clampedProj;
                        const distX = enemies[j].x - closestX;
                        const distY = enemies[j].y - closestY;
                        const dist = Math.sqrt(distX * distX + distY * distY);
                        
                        if (dist < enemies[j].size + bullets[i].width) {
                            enemies[j].health -= bullets[i].damage;
                            // 击中特效
                            for (let k = 0; k < 3; k++) {
                                particles.push(new Particle(
                                    enemies[j].x, enemies[j].y,
                                    (Math.random() - 0.5) * 4,
                                    (Math.random() - 0.5) * 4,
                                    '#ff44aa'
                                ));
                            }
                            
                            if (enemies[j].health <= 0) {
                                enemies.splice(j, 1);
                            }
                        }
                    }
                }
                
                // 检测光束军刀近战攻击
                if (mech.isSwinging && mech.currentWeapon.drawType === 'blade') {
                    const totalAngle = mech.bodyAngle + mech.upperAngle + mech.weaponAngle;
                    const swingStart = totalAngle - mech.currentWeapon.swingRange / 2;
                    const swingEnd = totalAngle + mech.currentWeapon.swingRange / 2;
                    const bladeLength = mech.currentWeapon.barrelLength;
                    
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const dx = enemies[j].x - mech.x;
                        const dy = enemies[j].y - mech.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const angleToEnemy = Math.atan2(dx, -dy);
                        
                        // 归一化角度到 [-PI, PI]
                        let normalizedAngle = angleToEnemy;
                        while (normalizedAngle > Math.PI) normalizedAngle -= Math.PI * 2;
                        while (normalizedAngle < -Math.PI) normalizedAngle += Math.PI * 2;
                        
                        let normalizedStart = swingStart;
                        while (normalizedStart > Math.PI) normalizedStart -= Math.PI * 2;
                        while (normalizedStart < -Math.PI) normalizedStart += Math.PI * 2;
                        
                        let normalizedEnd = swingEnd;
                        while (normalizedEnd > Math.PI) normalizedEnd -= Math.PI * 2;
                        while (normalizedEnd < -Math.PI) normalizedEnd += Math.PI * 2;
                        
                        const inRange = dist < bladeLength + enemies[j].size + 10;
                        const inAngle = normalizedAngle >= normalizedStart && normalizedAngle <= normalizedEnd;
                        
                        if (inRange && inAngle) {
                            enemies[j].health -= mech.currentWeapon.damage;
                            // 击中特效
                            for (let k = 0; k < 8; k++) {
                                particles.push(new Particle(
                                    enemies[j].x, enemies[j].y,
                                    (Math.random() - 0.5) * 6,
                                    (Math.random() - 0.5) * 6,
                                    '#00ff88'
                                ));
                            }
                            
                            if (enemies[j].health <= 0) {
                                enemies.splice(j, 1);
                            }
                        }
                    }
                }
                
                // 检测子弹是否击中玩家（只检测敌人发射的子弹）
                if (bullets[i] instanceof Bullet && bullets[i].weapon === WEAPONS.VULCAN) {
                    const dx = bullets[i].x - mech.x;
                    const dy = bullets[i].y - mech.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 20 + bullets[i].radius) {
                        // 玩家被击中特效
                        for (let k = 0; k < 5; k++) {
                            particles.push(new Particle(
                                mech.x, mech.y,
                                (Math.random() - 0.5) * 4,
                                (Math.random() - 0.5) * 4,
                                '#00d4ff'
                            ));
                        }
                        bullets.splice(i, 1);
                    }
                }
                
                // 激光束不需要边界检测，用寿命控制
                if (bullets[i] && bullets[i].life <= 0 || 
                    (bullets[i] instanceof Bullet && 
                     (bullets[i].x < 0 || bullets[i].x > WORLD_WIDTH ||
                      bullets[i].y < 0 || bullets[i].y > WORLD_HEIGHT))) {
                    bullets.splice(i, 1);
                }
            }
            
            // 子弹障碍物碰撞检测
            for (let i = bullets.length - 1; i >= 0; i--) {
                if (bullets[i] instanceof Bullet || bullets[i] instanceof LaserBeam) {
                    for (let j = 0; j < obstacles.length; j++) {
                        const obs = obstacles[j];
                        if (bullets[i].x >= obs.x && bullets[i].x <= obs.x + obs.width &&
                            bullets[i].y >= obs.y && bullets[i].y <= obs.y + obs.height) {
                            // 击中障碍物特效
                            for (let k = 0; k < 3; k++) {
                                particles.push(new Particle(
                                    bullets[i].x, bullets[i].y,
                                    (Math.random() - 0.5) * 2,
                                    (Math.random() - 0.5) * 2,
                                    '#888'
                                ));
                            }
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                }
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 更新和绘制钩爪
            for (let i = hooks.length - 1; i >= 0; i--) {
                hooks[i].update(mech);
                hooks[i].draw();
                
                if (hooks[i].state === 'done') {
                    hooks.splice(i, 1);
                }
            }
            
            drawWeaponUI();
            drawMinimap();
            
            ctx.fillStyle = '#00d4ff';
            ctx.font = '13px monospace';
            const speed = Math.sqrt(mech.velocityX * mech.velocityX + mech.velocityY * mech.velocityY);
            ctx.fillText('速度: ' + (speed * 10).toFixed(1) + ' km/h', 10, canvas.height - 100);
            ctx.fillText('底盘角度: ' + (mech.bodyAngle * 180 / Math.PI % 360).toFixed(1) + '°', 10, canvas.height - 80);
            ctx.fillText('上半身角度: ' + (mech.upperAngle * 180 / Math.PI).toFixed(1) + '°', 10, canvas.height - 60);
            ctx.fillText('武器角度: ' + (mech.weaponAngle * 180 / Math.PI).toFixed(1) + '°', 10, canvas.height - 40);
            ctx.fillText('当前武器: ' + mech.currentWeapon.name, 10, canvas.height - 20);
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
