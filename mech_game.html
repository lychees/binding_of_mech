<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二足机甲战斗</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #333;
            background: #1a1a1a;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
        }
        #info h3 {
            margin: 0 0 10px 0;
            color: #00d4ff;
        }
        #info p {
            margin: 5px 0;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>操作说明</h3>
        <p><span class="key">W</span><span class="key">S</span> - 前进/后退</p>
        <p><span class="key">A</span><span class="key">D</span> - 左右侧移（横向平移）</p>
        <p><span class="key">Q</span><span class="key">E</span> - 机甲左右转向</p>
        <p><span class="key">←</span><span class="key">→</span> - 上半身/武器左右转向</p>
        <p><span class="key">空格</span> - 发射武器</p>
        <p><span class="key">1</span><span class="key">2</span><span class="key">3</span><span class="key">4</span> - 切换武器</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 800;
        canvas.height = 600;
        
        const keys = {};
        const bullets = [];
        const particles = [];
        const footprints = [];
        
        // 武器类型定义
        const WEAPONS = {
            RIFLE: {
                name: '突击步枪',
                color: '#7a9aba',
                muzzleColor: '#3a5a7a',
                bulletColor: '#00d4ff',
                bulletSpeed: 10,
                bulletRadius: 3,
                fireRate: 8,
                damage: 10,
                recoil: 0.3,
                spread: 0.05,
                bulletLife: 80,
                barrelLength: 30,
                barrelWidth: 6,
                drawType: 'rifle'
            },
            SHOTGUN: {
                name: '霰弹枪',
                color: '#8a6a4a',
                muzzleColor: '#5a3a2a',
                bulletColor: '#ffaa44',
                bulletSpeed: 8,
                bulletRadius: 2,
                fireRate: 30,
                damage: 8,
                recoil: 0.8,
                spread: 0.3,
                bulletLife: 40,
                pelletCount: 5,
                barrelLength: 22,
                barrelWidth: 10,
                drawType: 'shotgun'
            },
            CANNON: {
                name: '加农炮',
                color: '#6a7a6a',
                muzzleColor: '#3a4a3a',
                bulletColor: '#ff6644',
                bulletSpeed: 6,
                bulletRadius: 8,
                fireRate: 50,
                damage: 50,
                recoil: 1.5,
                spread: 0.02,
                bulletLife: 120,
                barrelLength: 35,
                barrelWidth: 12,
                drawType: 'cannon'
            },
            LASER: {
                name: '激光炮',
                color: '#9a4a6a',
                muzzleColor: '#6a2a4a',
                bulletColor: '#ff44aa',
                bulletSpeed: 15,
                bulletRadius: 4,
                fireRate: 15,
                damage: 15,
                recoil: 0.2,
                spread: 0.01,
                bulletLife: 60,
                barrelLength: 28,
                barrelWidth: 8,
                drawType: 'laser'
            }
        };
        
        // 二足机甲类
        class Mech {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.bodyAngle = 0;      // 下半身/底盘角度（初始面朝上）
                this.upperAngle = 0;     // 上半身角度（相对bodyAngle）
                this.weaponAngle = 0;    // 武器角度（相对upperAngle）
                
                // 移动速度
                this.velocityX = 0;
                this.velocityY = 0;
                this.maxSpeed = 2.5;
                this.acceleration = 0.12;
                this.deceleration = 0.04;
                
                // 转向速度
                this.turnVelocity = 0;
                this.maxTurnSpeed = 0.05;
                this.turnAcceleration = 0.02;
                this.turnDeceleration = 0.03;
                
                // 上半身转向
                this.upperTurnVelocity = 0;
                this.maxUpperTurnSpeed = 0.04;
                this.upperTurnDeceleration = 0.025;
                
                // 武器转向
                this.weaponTurnVelocity = 0;
                this.maxWeaponTurnSpeed = 0.035;
                this.weaponTurnDeceleration = 0.02;
                
                // 行走动画
                this.walkCycle = 0;
                this.walkSpeed = 0.15;
                
                // 尺寸
                this.legWidth = 8;
                this.legLength = 35;
                this.bodyWidth = 30;
                this.bodyHeight = 25;
                this.upperWidth = 25;
                this.upperHeight = 20;
                
                // 喷气特效
                this.jetParticles = [];
                
                // 武器系统
                this.currentWeapon = WEAPONS.RIFLE;
                this.fireCooldown = 0;
                this.weaponKeys = ['1', '2', '3', '4'];
                this.weaponList = [WEAPONS.RIFLE, WEAPONS.SHOTGUN, WEAPONS.CANNON, WEAPONS.LASER];
            }
            
            update() {
                // 处理武器切换
                for (let i = 0; i < this.weaponKeys.length; i++) {
                    if (keys[this.weaponKeys[i]]) {
                        this.currentWeapon = this.weaponList[i];
                        keys[this.weaponKeys[i]] = false; // 防止连续切换
                        break;
                    }
                }
                
                // 处理射击冷却
                if (this.fireCooldown > 0) {
                    this.fireCooldown--;
                }
                
                // 处理前进后退
                let moveForward = 0;
                if (keys['w'] || keys['W']) moveForward = 1;
                else if (keys['s'] || keys['S']) moveForward = -1;
                
                // 处理侧移
                let moveSide = 0;
                if (keys['a'] || keys['A']) moveSide = -1;
                else if (keys['d'] || keys['D']) moveSide = 1;
                
                // 计算目标速度向量
                const cos = Math.cos(this.bodyAngle);
                const sin = Math.sin(this.bodyAngle);
                
                // 前进后退速度（bodyAngle=0时面朝上，即Y轴负方向）
                // 前进方向向量: (-sin, -cos)，因为sin(0)=0, cos(0)=1，所以是(0, -1)朝上
                // 侧移方向向量: (cos, -sin)，面朝上时侧移是(1, 0)即向右
                const targetVX = (sin) * moveForward * this.maxSpeed + cos * moveSide * this.maxSpeed * 0.7;
                const targetVY = (-cos) * moveForward * this.maxSpeed + sin * moveSide * this.maxSpeed * 0.7;
                
                // 惯性加速/减速
                if (moveForward !== 0 || moveSide !== 0) {
                    this.velocityX += (targetVX - this.velocityX) * this.acceleration;
                    this.velocityY += (targetVY - this.velocityY) * this.acceleration;
                } else {
                    // 自然减速（惯性滑行）
                    this.velocityX *= (1 - this.deceleration);
                    this.velocityY *= (1 - this.deceleration);
                    if (Math.abs(this.velocityX) < 0.01) this.velocityX = 0;
                    if (Math.abs(this.velocityY) < 0.01) this.velocityY = 0;
                }
                
                // 应用移动
                this.x += this.velocityX;
                this.y += this.velocityY;
                
                // 边界限制
                this.x = Math.max(30, Math.min(canvas.width - 30, this.x));
                this.y = Math.max(30, Math.min(canvas.height - 30, this.y));
                
                // 处理底盘转向（Q/E键）
                let targetTurn = 0;
                if (keys['e'] || keys['E']) targetTurn = this.maxTurnSpeed;
                else if (keys['q'] || keys['Q']) targetTurn = -this.maxTurnSpeed;
                
                if (targetTurn !== 0) {
                    this.turnVelocity += (targetTurn - this.turnVelocity) * 0.15;
                } else {
                    this.turnVelocity *= (1 - this.turnDeceleration);
                    if (Math.abs(this.turnVelocity) < 0.001) this.turnVelocity = 0;
                }
                this.bodyAngle += this.turnVelocity;
                
                // 处理上半身转向（左右箭头）
                let targetUpperTurn = 0;
                if (keys['ArrowLeft']) targetUpperTurn = -this.maxUpperTurnSpeed;
                else if (keys['ArrowRight']) targetUpperTurn = this.maxUpperTurnSpeed;
                
                if (targetUpperTurn !== 0) {
                    this.upperTurnVelocity += (targetUpperTurn - this.upperTurnVelocity) * 0.12;
                } else {
                    this.upperTurnVelocity *= (1 - this.upperTurnDeceleration);
                    if (Math.abs(this.upperTurnVelocity) < 0.001) this.upperTurnVelocity = 0;
                }
                this.upperAngle += this.upperTurnVelocity;
                
                // 限制上半身转向角度（相对底盘）
                const maxUpperAngle = Math.PI * 0.8;
                this.upperAngle = Math.max(-maxUpperAngle, Math.min(maxUpperAngle, this.upperAngle));
                
                // 处理武器转向（Shift+左右箭头）
                let targetWeaponTurn = 0;
                if (keys['Shift'] && keys['ArrowLeft']) targetWeaponTurn = -this.maxWeaponTurnSpeed;
                else if (keys['Shift'] && keys['ArrowRight']) targetWeaponTurn = this.maxWeaponTurnSpeed;
                
                if (targetWeaponTurn !== 0) {
                    this.weaponTurnVelocity += (targetWeaponTurn - this.weaponTurnVelocity) * 0.1;
                } else {
                    this.weaponTurnVelocity *= (1 - this.weaponTurnDeceleration);
                    if (Math.abs(this.weaponTurnVelocity) < 0.001) this.weaponTurnVelocity = 0;
                }
                this.weaponAngle += this.weaponTurnVelocity;
                
                // 行走动画
                const speed = Math.sqrt(this.velocityX * this.velocityX + this.velocityY * this.velocityY);
                if (speed > 0.1) {
                    this.walkCycle += this.walkSpeed * (speed / this.maxSpeed);
                }
                
                // 添加脚印
                if (speed > 0.5 && Math.sin(this.walkCycle) > 0.9) {
                    this.addFootprint();
                }
                
                // 更新脚印
                for (let i = footprints.length - 1; i >= 0; i--) {
                    footprints[i].opacity -= 0.005;
                    if (footprints[i].opacity <= 0) {
                        footprints.splice(i, 1);
                    }
                }
                
                // 喷气特效
                if (speed > 1 || Math.abs(this.turnVelocity) > 0.01) {
                    this.addJetParticle();
                }
                
                for (let i = this.jetParticles.length - 1; i >= 0; i--) {
                    this.jetParticles[i].update();
                    if (this.jetParticles[i].life <= 0) {
                        this.jetParticles.splice(i, 1);
                    }
                }
            }
            
            addFootprint() {
                const cos = Math.cos(this.bodyAngle);
                const sin = Math.sin(this.bodyAngle);
                const offset = 12;
                
                footprints.push({
                    x: this.x + cos * this.legLength * 0.6 + (Math.sin(this.walkCycle) > 0 ? -sin * offset : sin * offset),
                    y: this.y + sin * this.legLength * 0.6 + (Math.sin(this.walkCycle) > 0 ? cos * offset : -cos * offset),
                    angle: this.bodyAngle,
                    opacity: 0.3
                });
            }
            
            addJetParticle() {
                const cos = Math.cos(this.bodyAngle);
                const sin = Math.sin(this.bodyAngle);
                
                this.jetParticles.push({
                    x: this.x - cos * 15 + (Math.random() - 0.5) * 10,
                    y: this.y - sin * 15 + (Math.random() - 0.5) * 10,
                    vx: -cos * 0.5 + (Math.random() - 0.5) * 0.3,
                    vy: -sin * 0.5 + (Math.random() - 0.5) * 0.3,
                    life: 20,
                    maxLife: 20,
                    color: 'hsl(' + (180 + Math.random() * 40) + ', 80%, 60%)',
                    update: function() {
                        this.x += this.vx;
                        this.y += this.vy;
                        this.vx *= 0.95;
                        this.vy *= 0.95;
                        this.life--;
                    }
                });
            }
            
            draw() {
                // 绘制脚印
                for (let i = 0; i < footprints.length; i++) {
                    const fp = footprints[i];
                    ctx.save();
                    ctx.translate(fp.x, fp.y);
                    ctx.rotate(fp.angle);
                    ctx.fillStyle = 'rgba(80, 80, 80, ' + fp.opacity + ')';
                    ctx.fillRect(-4, -6, 8, 12);
                    ctx.restore();
                }
                
                // 绘制喷气粒子
                for (let i = 0; i < this.jetParticles.length; i++) {
                    const p = this.jetParticles[i];
                    const opacity = p.life / p.maxLife;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = opacity * 0.6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2 * opacity, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 计算腿部动画
                const leftLegOffset = Math.sin(this.walkCycle) * 8;
                const rightLegOffset = Math.sin(this.walkCycle + Math.PI) * 8;
                const leftKnee = Math.sin(this.walkCycle + Math.PI * 0.5) * 5;
                const rightKnee = Math.sin(this.walkCycle + Math.PI * 1.5) * 5;
                
                // 绘制阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(0, 25, 25, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制左腿
                ctx.save();
                ctx.rotate(this.bodyAngle);
                this.drawLeg(-12, leftLegOffset, leftKnee, true);
                ctx.restore();
                
                // 绘制右腿
                ctx.save();
                ctx.rotate(this.bodyAngle);
                this.drawLeg(12, rightLegOffset, rightKnee, false);
                ctx.restore();
                
                // 绘制下半身（底盘）
                ctx.save();
                ctx.rotate(this.bodyAngle);
                
                // 底盘主体
                ctx.fillStyle = '#4a5568';
                ctx.fillRect(-this.bodyWidth/2, -this.bodyHeight/2, this.bodyWidth, this.bodyHeight);
                
                // 底盘细节
                ctx.fillStyle = '#2d3748';
                ctx.fillRect(-this.bodyWidth/2 + 3, -this.bodyHeight/2 + 3, this.bodyWidth - 6, this.bodyHeight - 6);
                
                // 底盘装甲纹理
                ctx.strokeStyle = '#5a6578';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-10, -8);
                ctx.lineTo(10, -8);
                ctx.moveTo(-10, 0);
                ctx.lineTo(10, 0);
                ctx.moveTo(-10, 8);
                ctx.lineTo(10, 8);
                ctx.stroke();
                
                ctx.restore();
                
                // 绘制上半身（相对底盘旋转）
                ctx.save();
                ctx.rotate(this.bodyAngle + this.upperAngle);
                
                // 腰部连接
                ctx.fillStyle = '#5a6a7d';
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // 上半身主体
                ctx.fillStyle = '#5a7a9a';
                ctx.fillRect(-this.upperWidth/2, -this.upperHeight/2 - 5, this.upperWidth, this.upperHeight);
                
                // 驾驶舱
                ctx.fillStyle = '#7a9aba';
                ctx.beginPath();
                ctx.arc(0, -5, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // 驾驶舱玻璃
                ctx.fillStyle = '#a0d0f0';
                ctx.beginPath();
                ctx.arc(0, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 肩部装甲
                ctx.fillStyle = '#4a6a8a';
                ctx.fillRect(-this.upperWidth/2 - 3, -this.upperHeight/2 - 3, 6, 12);
                ctx.fillRect(this.upperWidth/2 - 3, -this.upperHeight/2 - 3, 6, 12);
                
                // 绘制武器（相对上半身旋转）
                ctx.save();
                ctx.rotate(this.weaponAngle);
                this.drawWeapon();
                ctx.restore();
                
                ctx.restore();
                ctx.restore();
            }
            
            drawWeapon() {
                const w = this.currentWeapon;
                
                // 武器底座
                ctx.fillStyle = w.color;
                ctx.beginPath();
                ctx.arc(0, -5, 6, 0, Math.PI * 2);
                ctx.fill();
                
                switch (w.drawType) {
                    case 'rifle':
                        // 突击步枪 - 细长枪管
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        ctx.fillStyle = w.muzzleColor;
                        ctx.fillRect(-w.barrelWidth/2 - 1, -w.barrelLength, w.barrelWidth + 2, 4);
                        ctx.fillStyle = '#9abaca';
                        ctx.fillRect(-1, -w.barrelLength + 2, 2, w.barrelLength - 4);
                        // 弹匣
                        ctx.fillStyle = '#4a5a6a';
                        ctx.fillRect(-2, -15, 4, 10);
                        break;
                        
                    case 'shotgun':
                        // 霰弹枪 - 粗短双管
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        // 双管效果
                        ctx.fillStyle = w.muzzleColor;
                        ctx.fillRect(-4, -w.barrelLength, 3, w.barrelLength - 2);
                        ctx.fillRect(1, -w.barrelLength, 3, w.barrelLength - 2);
                        // 散热孔
                        ctx.fillStyle = '#6a5a4a';
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(-6, -w.barrelLength + 5 + i * 6, 12, 2);
                        }
                        break;
                        
                    case 'cannon':
                        // 加农炮 - 粗长炮管，带支架
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        // 炮口制退器
                        ctx.fillStyle = w.muzzleColor;
                        ctx.fillRect(-w.barrelWidth/2 - 2, -w.barrelLength - 3, w.barrelWidth + 4, 6);
                        // 支架
                        ctx.fillStyle = '#5a6a5a';
                        ctx.fillRect(-3, -10, 6, 8);
                        ctx.fillRect(-8, -8, 16, 3);
                        // 高光
                        ctx.fillStyle = '#8a9a8a';
                        ctx.fillRect(-2, -w.barrelLength + 3, 4, w.barrelLength - 6);
                        break;
                        
                    case 'laser':
                        // 激光炮 - 科技风格，带能量环
                        ctx.fillStyle = w.color;
                        ctx.fillRect(-w.barrelWidth/2, -w.barrelLength, w.barrelWidth, w.barrelLength);
                        // 能量核心
                        ctx.fillStyle = '#ff88cc';
                        ctx.beginPath();
                        ctx.arc(0, -w.barrelLength/2, 3, 0, Math.PI * 2);
                        ctx.fill();
                        // 能量环
                        ctx.strokeStyle = '#ff44aa';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, -w.barrelLength/2, 5, 0, Math.PI * 2);
                        ctx.stroke();
                        // 发光效果
                        ctx.fillStyle = 'rgba(255, 100, 180, 0.3)';
                        ctx.beginPath();
                        ctx.arc(0, -w.barrelLength/2, 8, 0, Math.PI * 2);
                        ctx.fill();
                        // 炮口
                        ctx.fillStyle = '#ff66aa';
                        ctx.fillRect(-w.barrelWidth/2 - 1, -w.barrelLength - 2, w.barrelWidth + 2, 3);
                        break;
                }
            }
            
            drawLeg(xOffset, footOffset, kneeOffset, isLeft) {
                // 大腿
                ctx.strokeStyle = '#4a5568';
                ctx.lineWidth = this.legWidth;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(xOffset, 0);
                ctx.lineTo(xOffset + kneeOffset * 0.3, this.legLength * 0.5);
                ctx.stroke();
                
                // 小腿
                ctx.beginPath();
                ctx.moveTo(xOffset + kneeOffset * 0.3, this.legLength * 0.5);
                ctx.lineTo(xOffset + footOffset * 0.2, this.legLength + footOffset * 0.1);
                ctx.stroke();
                
                // 关节
                ctx.fillStyle = '#5a6a7d';
                ctx.beginPath();
                ctx.arc(xOffset, 0, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(xOffset + kneeOffset * 0.3, this.legLength * 0.5, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // 脚
                ctx.fillStyle = '#3a4558';
                ctx.save();
                ctx.translate(xOffset + footOffset * 0.2, this.legLength + footOffset * 0.1);
                ctx.fillRect(-6, -2, 12, 6);
                ctx.restore();
            }
            
            shoot() {
                if (this.fireCooldown > 0) return;
                
                const w = this.currentWeapon;
                this.fireCooldown = w.fireRate;
                
                const totalAngle = this.bodyAngle + this.upperAngle + this.weaponAngle;
                const cos = Math.cos(totalAngle);
                const sin = Math.sin(totalAngle);
                
                const muzzleX = this.x + sin * w.barrelLength;
                const muzzleY = this.y - cos * w.barrelLength;
                
                // 根据武器类型发射不同的子弹
                if (w.drawType === 'shotgun') {
                    // 霰弹枪发射多个弹丸
                    for (let i = 0; i < w.pelletCount; i++) {
                        const spread = (Math.random() - 0.5) * w.spread * 2;
                        bullets.push(new Bullet(
                            muzzleX, muzzleY, 
                            totalAngle + spread, 
                            w
                        ));
                    }
                } else {
                    // 其他武器单发
                    const spread = (Math.random() - 0.5) * w.spread * 2;
                    bullets.push(new Bullet(
                        muzzleX, muzzleY, 
                        totalAngle + spread, 
                        w
                    ));
                }
                
                // 发射特效
                const particleCount = w.drawType === 'cannon' ? 15 : 8;
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(
                        muzzleX,
                        muzzleY,
                        -sin * 2 + (Math.random() - 0.5) * 3,
                        cos * 2 + (Math.random() - 0.5) * 3,
                        w.bulletColor
                    ));
                }
                
                // 后坐力
                this.velocityX -= sin * w.recoil;
                this.velocityY += cos * w.recoil;
            }
        }
        
        class Bullet {
            constructor(x, y, angle, weapon) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.weapon = weapon;
                this.speed = weapon.bulletSpeed;
                this.radius = weapon.bulletRadius;
                this.life = weapon.bulletLife;
                this.damage = weapon.damage;
            }
            
            update() {
                this.x += Math.sin(this.angle) * this.speed;
                this.y -= Math.cos(this.angle) * this.speed;
                this.life--;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                const w = this.weapon;
                
                if (w.drawType === 'laser') {
                    // 激光子弹 - 发光效果
                    ctx.fillStyle = 'rgba(255, 100, 180, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = w.bulletColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (w.drawType === 'cannon') {
                    // 炮弹 - 大光晕
                    ctx.fillStyle = 'rgba(255, 100, 50, 0.4)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = w.bulletColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 尾焰
                    ctx.fillStyle = 'rgba(255, 150, 50, 0.6)';
                    ctx.fillRect(-this.radius - 8, -this.radius/2, 8, this.radius);
                } else {
                    // 普通子弹
                    ctx.fillStyle = 'rgba(0, 200, 255, 0.4)';
                    ctx.fillRect(-12, -2, 10, 4);
                    
                    ctx.fillStyle = w.bulletColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(0, 200, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = 25;
                this.maxLife = 25;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life--;
            }
            
            draw() {
                const opacity = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2 + opacity * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        const mech = new Mech(canvas.width / 2, canvas.height / 2);
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === ' ') {
                e.preventDefault();
                mech.shoot();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        function drawGrid() {
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 0.5;
            
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        function drawWeaponUI() {
            const startX = canvas.width - 150;
            const startY = 20;
            const itemHeight = 35;
            
            for (let i = 0; i < mech.weaponList.length; i++) {
                const w = mech.weaponList[i];
                const isActive = w === mech.currentWeapon;
                const y = startY + i * itemHeight;
                
                // 背景
                ctx.fillStyle = isActive ? 'rgba(0, 200, 255, 0.3)' : 'rgba(50, 50, 50, 0.5)';
                ctx.fillRect(startX, y, 130, 30);
                
                // 边框
                ctx.strokeStyle = isActive ? '#00d4ff' : '#555';
                ctx.lineWidth = isActive ? 2 : 1;
                ctx.strokeRect(startX, y, 130, 30);
                
                // 武器颜色标识
                ctx.fillStyle = w.color;
                ctx.fillRect(startX + 5, y + 8, 14, 14);
                
                // 武器名称
                ctx.fillStyle = '#fff';
                ctx.font = '12px monospace';
                ctx.fillText((i + 1) + '. ' + w.name, startX + 24, y + 20);
            }
            
            // 当前武器冷却条
            if (mech.fireCooldown > 0) {
                const w = mech.currentWeapon;
                const cooldownRatio = mech.fireCooldown / w.fireRate;
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.fillRect(startX, startY + mech.weaponList.length * itemHeight + 5, 130 * cooldownRatio, 5);
            }
        }
        
        function gameLoop() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            
            mech.update();
            mech.draw();
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                bullets[i].draw();
                
                if (bullets[i].life <= 0 || 
                    bullets[i].x < 0 || bullets[i].x > canvas.width ||
                    bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 绘制武器UI
            drawWeaponUI();
            
            // 显示状态信息
            ctx.fillStyle = '#00d4ff';
            ctx.font = '13px monospace';
            const speed = Math.sqrt(mech.velocityX * mech.velocityX + mech.velocityY * mech.velocityY);
            ctx.fillText('速度: ' + (speed * 10).toFixed(1) + ' km/h', 10, canvas.height - 100);
            ctx.fillText('底盘角度: ' + (mech.bodyAngle * 180 / Math.PI % 360).toFixed(1) + '°', 10, canvas.height - 80);
            ctx.fillText('上半身角度: ' + (mech.upperAngle * 180 / Math.PI).toFixed(1) + '°', 10, canvas.height - 60);
            ctx.fillText('武器角度: ' + (mech.weaponAngle * 180 / Math.PI).toFixed(1) + '°', 10, canvas.height - 40);
            ctx.fillText('当前武器: ' + mech.currentWeapon.name, 10, canvas.height - 20);
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
